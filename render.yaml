databases:
  - name: cv-screener-db
    databaseName: cvscreener
    user: cvscreener
    plan: free

services:
  - type: web
    name: cv-screener
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cv-screener-db
          property: connectionString
